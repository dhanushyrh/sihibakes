# A string used to distinguish different Supabase projects on the same host. Defaults to the
# working directory name when running `supabase init`.
project_id = "sihibakes"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
# Production redirect URLs (Vercel, Amplify, custom domain) are configured in
# Supabase Dashboard → Authentication → URL configuration. See docs/amplify-deploy.md.
additional_redirect_urls = ["http://localhost:3000/admin"]
