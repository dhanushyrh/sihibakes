<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SUBJECT}}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #faf7f4;
      font-family: Georgia, 'Times New Roman', serif;
      color: #4b2c20;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background-color: #faf7f4; padding: 32px 16px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background-color: #ffffff;
              border-radius: 16px;
              overflow: hidden;
              border: 1px solid rgba(75, 44, 32, 0.1);
            "
          >
            <tr>
              <td
                style="
                  padding: 28px 32px 20px;
                  background-color: #4b2c20;
                  color: #faf7f4;
                "
              >
                <p
                  style="
                    margin: 0;
                    font-size: 12px;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    opacity: 0.8;
                  "
                >
                  Sihi Bakes Admin
                </p>
                <h1
                  style="
                    margin: 8px 0 0;
                    font-size: 22px;
                    font-weight: 600;
                    line-height: 1.35;
                  "
                >
                  {{TITLE}}
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 24px 32px 8px">
                <span
                  style="
                    display: inline-block;
                    padding: 4px 10px;
                    border-radius: 999px;
                    font-size: 11px;
                    font-weight: 600;
                    letter-spacing: 0.04em;
                    text-transform: uppercase;
                    {{SEVERITY_BADGE_STYLE}}
                  "
                >
                  {{SEVERITY}}
                </span>
              </td>
            </tr>

            <tr>
              <td style="padding: 8px 32px 0">
                <p
                  style="
                    margin: 0;
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                      Roboto, sans-serif;
                    font-size: 14px;
                    line-height: 1.6;
                    white-space: pre-wrap;
                    color: rgba(75, 44, 32, 0.9);
                  "
                >
                  {{MESSAGE}}
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 24px 32px 0">
                <table
                  role="presentation"
                  width="100%"
                  cellspacing="0"
                  cellpadding="0"
                  style="
                    background-color: #faf7f4;
                    border-radius: 12px;
                    border: 1px solid rgba(75, 44, 32, 0.08);
                  "
                >
                  <tr>
                    <td style="padding: 16px 18px">
                      <p
                        style="
                          margin: 0 0 10px;
                          font-family: -apple-system, BlinkMacSystemFont,
                            'Segoe UI', Roboto, sans-serif;
                          font-size: 11px;
                          font-weight: 600;
                          letter-spacing: 0.06em;
                          text-transform: uppercase;
                          color: rgba(75, 44, 32, 0.5);
                        "
                      >
                        Details
                      </p>
                      <p
                        style="
                          margin: 0 0 6px;
                          font-family: -apple-system, BlinkMacSystemFont,
                            'Segoe UI', Roboto, sans-serif;
                          font-size: 13px;
                          line-height: 1.5;
                        "
                      >
                        <strong>Order:</strong> {{ORDER_LABEL}}
                      </p>
                      <p
                        style="
                          margin: 0 0 6px;
                          font-family: -apple-system, BlinkMacSystemFont,
                            'Segoe UI', Roboto, sans-serif;
                          font-size: 13px;
                          line-height: 1.5;
                        "
                      >
                        <strong>Type:</strong> {{ALERT_TYPE}}
                      </p>
                      <p
                        style="
                          margin: 0;
                          font-family: -apple-system, BlinkMacSystemFont,
                            'Segoe UI', Roboto, sans-serif;
                          font-size: 13px;
                          line-height: 1.5;
                        "
                      >
                        <strong>Time:</strong> {{CREATED_AT}}
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            {{ORDER_BUTTON_ROW}}

            <tr>
              <td
                style="
                  padding: 28px 32px 24px;
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI',
                    Roboto, sans-serif;
                  font-size: 12px;
                  line-height: 1.5;
                  color: rgba(75, 44, 32, 0.45);
                "
              >
                This is an automated alert from your Sihi Bakes store. In-app
                alerts are also available on the admin dashboard.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
